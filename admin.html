<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Voyage - Panel Administrateur Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-24">

    <div class="max-w-3xl mx-auto px-4 pt-10">
        <!-- Header -->
        <div class="border-b border-slate-800 pb-6 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-white flex items-center gap-3">🛠️ Panel Organisateur Pro</h1>
                <p class="text-slate-400 text-sm mt-1">Gestion multi-hôtels illimités, vols et plannings d'activités.</p>
            </div>
            <button type="button" id="btn-reset-all" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold px-4 py-2.5 rounded-xl transition border border-slate-700">Vider le formulaire</button>
        </div>

        <!-- 1. IDENTIFICATION -->
        <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700/50 shadow-xl mb-6">
            <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400 mb-4">1. Identification du Client</h2>
            <div>
                <label class="block text-xs text-slate-400 font-semibold mb-2">UID Supabase du client</label>
                <div class="flex gap-3">
                    <input type="text" id="target-user-id" placeholder="Ex: 75ff0cdd-1497-402b-bba5..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white font-mono">
                    <button type="button" id="btn-load" class="bg-indigo-600 hover:bg-indigo-500 px-5 rounded-xl font-semibold text-sm transition flex items-center gap-2 text-white shadow-lg disabled:opacity-50">🔄 Charger</button>
                </div>
            </div>
        </section>

        <!-- FORMULAIRE -->
        <form id="admin-form" class="space-y-6">
            
            <!-- 2. DESTINATION & VOLS -->
            <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700/50 shadow-xl space-y-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400">2. Destination & Transports</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Destination</label>
                        <input type="text" id="destination" placeholder="Ex: Madère" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Date & Heure de l'Aller (Compteur)</label>
                        <input type="datetime-local" id="date_depart" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                    </div>
                </div>

                <div class="border-t border-slate-700/50 pt-4 grid grid-cols-3 gap-4">
                    <div class="col-span-3 text-xs font-bold text-slate-400 uppercase tracking-wider">🛫 Vol Aller</div>
                    <input type="text" id="vol_nom" placeholder="Compagnie Aller" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                    <input type="text" id="vol_numero" placeholder="N° Vol Aller" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                    <input type="text" disabled placeholder="Date gérée au-dessus" class="bg-slate-800/50 border border-slate-700 text-slate-500 rounded-xl px-4 py-3 text-sm cursor-not-allowed">
                </div>

                <div class="border-t border-slate-700/50 pt-4 grid grid-cols-3 gap-4">
                    <div class="col-span-3 text-xs font-bold text-slate-400 uppercase tracking-wider">🛬 Vol Retour</div>
                    <input type="text" id="vol_retour_nom" placeholder="Compagnie Retour" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                    <input type="text" id="vol_retour_numero" placeholder="N° Vol Retour" class="bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                    <input type="datetime-local" id="date_retour" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                </div>

                <div class="border-t border-slate-700/50 pt-2">
                    <label class="block text-xs text-slate-400 mb-1">Lien Universel Road-Book PDF</label>
                    <input type="url" id="pdf_url" placeholder="https://..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-white">
                </div>
            </section>

            <!-- 3. LOGEMENTS DYNAMIQUES -->
            <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700/50 shadow-xl space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400">3. Hébergements / Étapes (Illimités)</h2>
                    <button type="button" id="btn-add-hotel" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-xl transition shadow-md">➕ Ajouter un Logement</button>
                </div>
                <div id="hotels-container" class="space-y-4"></div>
            </section>

            <!-- 4. PROGRAMME MULTI-ACTIVITÉS -->
            <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700/50 shadow-xl space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-indigo-400">4. Itinéraire & Activités Précises</h2>
                    <button type="button" id="btn-add-day" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-xl transition shadow-md">➕ Ajouter un Jour</button>
                </div>
                <div id="days-container" class="space-y-6"></div>
            </section>

            <button type="submit" id="btn-submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition shadow-xl text-base tracking-wide flex items-center justify-center gap-2 disabled:opacity-50">
                💾 Enregistrer et synchroniser le voyage
            </button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://fwpncwhgadjexxqzwzvp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cG5jd2hnYWRqZXh4cXp3enZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjU3ODcsImV4cCI6MjA5NjUwMTc4N30.INMWhHLyP4X9qu-R1HIJQHya7ySdsI9oREXfwq7LVxA";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const btnLoad = document.getElementById('btn-load');
        const btnSubmit = document.getElementById('btn-submit');
        const btnResetAll = document.getElementById('btn-reset-all');
        const btnAddHotel = document.getElementById('btn-add-hotel');
        const hotelsContainer = document.getElementById('hotels-container');
        const btnAddDay = document.getElementById('btn-add-day');
        const daysContainer = document.getElementById('days-container');
        const adminForm = document.getElementById('admin-form');

        // Fonction pour vider l'intégralité des saisies à l'écran
        function resetForm(keepUserId = true) {
            if (!keepUserId) document.getElementById('target-user-id').value = '';
            document.getElementById('destination').value = '';
            document.getElementById('date_depart').value = '';
            document.getElementById('date_retour').value = '';
            document.getElementById('vol_nom').value = '';
            document.getElementById('vol_numero').value = '';
            document.getElementById('vol_retour_nom').value = '';
            document.getElementById('vol_retour_numero').value = '';
            document.getElementById('pdf_url').value = '';
            hotelsContainer.innerHTML = '';
            daysContainer.innerHTML = '';
        }

        btnResetAll.addEventListener('click', () => resetForm(false));

        // Ajouter une ligne d'Hébergement
        function addHotelRow(nom = '', checkin = '', checkout = '', mapsUrl = '') {
            const hotelCount = hotelsContainer.children.length + 1;
            const html = `
                <div class="hotel-row bg-slate-900 p-4 rounded-xl border border-slate-700 space-y-3 relative">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-amber-400 uppercase tracking-widest">🏨 Logement / Étape ${hotelCount}</span>
                        <button type="button" onclick="this.closest('.hotel-row').remove()" class="text-rose-400 hover:text-rose-500 text-xs font-semibold">Supprimer</button>
                    </div>
                    <input type="text" placeholder="Nom de l'hôtel ou Airbnb" value="${nom}" class="hotel-nom w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Dates Check-in (ex: Du 12/06 à 15:00)" value="${checkin}" class="hotel-checkin bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
                        <input type="text" placeholder="Dates Check-out (ex: Au 15/06 à 11:00)" value="${checkout}" class="hotel-checkout bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    <input type="url" placeholder="Lien Google Maps de l'hôtel" value="${mapsUrl}" class="hotel-maps w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
                </div>
            `;
            hotelsContainer.insertAdjacentHTML('beforeend', html);
        }

        // Ajouter une ligne d'activité
        function createActivityRow(container, horaire = '', titre = '', desc = '') {
            const html = `
                <div class="activity-row grid grid-cols-4 gap-2 bg-slate-950 p-3 rounded-lg border border-slate-800 relative group">
                    <input type="text" placeholder="09:00" value="${horaire}" class="act-horaire bg-slate-900 border border-slate-700 rounded p-1 text-xs text-white text-center focus:outline-none focus:border-indigo-500">
                    <input type="text" placeholder="Titre de l'activité" value="${titre}" class="act-titre col-span-3 bg-slate-900 border border-slate-700 rounded p-1 text-xs text-white focus:outline-none focus:border-indigo-500">
                    <textarea placeholder="Détails ou adresse..." rows="1" class="act-desc col-span-4 bg-slate-900 border border-slate-700 rounded p-1 text-xs text-white focus:outline-none focus:border-indigo-500">${desc}</textarea>
                    <button type="button" onclick="this.closest('.activity-row').remove()" class="absolute right-2 top-2 text-rose-500 text-[10px] hidden group-hover:block">Supprimer</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        // Ajouter un jour complet
        function addDayRow(titreJour = '', activitesArray = []) {
            const dayCount = daysContainer.children.length + 1;
            const uniqueId = 'activities-container-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            
            const dayHtml = `
                <div class="day-row bg-slate-900 p-5 rounded-xl border border-slate-700 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                        <span class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Jour ${dayCount}</span>
                        <button type="button" onclick="this.closest('.day-row').remove()" class="text-rose-400 hover:text-rose-500 text-xs font-semibold">Supprimer ce jour</button>
                    </div>
                    <div>
                        <input type="text" value="${titreJour}" placeholder="Titre Général du Jour (ex: Randonnée & Nature)" class="day-title w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center"><span class="text-[10px] uppercase font-bold text-slate-400">Chronologie de la journée</span><button type="button" class="text-indigo-400 hover:text-indigo-300 text-xs font-bold btn-add-activity">➕ Ajouter une activité</button></div>
                        <div id="${uniqueId}" class="activities-list space-y-2"></div>
                    </div>
                </div>
            `;
            daysContainer.insertAdjacentHTML('beforeend', dayHtml);
            
            const currentActContainer = document.getElementById(uniqueId);
            const currentAddBtn = currentActContainer.closest('.day-row').querySelector('.btn-add-activity');
            currentAddBtn.addEventListener('click', () => createActivityRow(currentActContainer));
            
            if(activitesArray.length > 0) {
                activitesArray.forEach(act => createActivityRow(currentActContainer, act.horaire, act.titre, act.desc));
            } else {
                createActivityRow(currentActContainer);
            }
        }

        btnAddHotel.addEventListener('click', () => addHotelRow());
        btnAddDay.addEventListener('click', () => addDayRow());

        // ACTION : CHARGER UN CLIENT
        btnLoad.addEventListener('click', async () => {
            const userId = document.getElementById('target-user-id').value.trim();
            if (!userId) return alert("Veuillez entrer l'UID du client !");

            btnLoad.disabled = true;
            btnLoad.innerText = "⏳ Recherche...";

            const { data: voyage, error } = await supabaseClient.from('voyages').select('*').eq('user_id', userId).maybeSingle();
            
            btnLoad.disabled = false;
            btnLoad.innerText = "🔄 Charger";

            if (error) return alert("Erreur réseau : " + error.message);
            
            // Si le client n'existe pas encore dans la table voyages
            if (!voyage) {
                resetForm(true); // On nettoie le formulaire mais on garde l'UID saisi
                alert("✨ Nouvel utilisateur détecté ! Le formulaire a été réinitialisé. Vous pouvez créer son premier voyage.");
                return;
            }

            // Si le client existe, on pré-remplit tout
            resetForm(true);
            document.getElementById('destination').value = voyage.destination || '';
            document.getElementById('vol_nom').value = voyage.vol_nom || '';
            document.getElementById('vol_numero').value = voyage.vol_numero || '';
            document.getElementById('vol_retour_nom').value = voyage.vol_retour_nom || '';
            document.getElementById('vol_retour_numero').value = voyage.vol_retour_numero || '';
            document.getElementById('pdf_url').value = voyage.pdf_url || '';
            
            if (voyage.date_depart) document.getElementById('date_depart').value = voyage.date_depart.substring(0,16);
            if (voyage.date_retour) document.getElementById('date_retour').value = voyage.date_retour.substring(0,16);

            if (voyage.hotels && Array.isArray(voyage.hotels)) {
                voyage.hotels.forEach(h => addHotelRow(h.nom, h.checkin, h.checkout, h.maps_url));
            }

            if (voyage.programme && Array.isArray(voyage.programme)) {
                voyage.programme.forEach(j => addDayRow(j.titre_jour, j.activites || []));
            }
        });

        // ACTION : ENREGISTRER / UPSERT
        adminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('target-user-id').value.trim();
            if (!userId) return alert("L'UID du client est obligatoire pour enregistrer.");

            btnSubmit.disabled = true;
            btnSubmit.innerText = "⏳ Enregistrement et synchronisation en cours...";

            // 1. Collecte des hôtels
            const hotelRows = document.querySelectorAll('.hotel-row');
            const hotelsArray = [];
            hotelRows.forEach(row => {
                const nom = row.querySelector('.hotel-nom').value.trim();
                const checkin = row.querySelector('.hotel-checkin').value.trim();
                const checkout = row.querySelector('.hotel-checkout').value.trim();
                const maps = row.querySelector('.hotel-maps').value.trim();
                if(nom) hotelsArray.push({ nom, checkin, checkout, maps_url: maps });
            });

            // 2. Collecte du programme
            const dayRows = document.querySelectorAll('.day-row');
            const programmeComplex = [];
            dayRows.forEach(dayRow => {
                const title = dayRow.querySelector('.day-title').value.trim();
                const actRows = dayRow.querySelectorAll('.activity-row');
                const acts = [];
                actRows.forEach(ar => {
                    const h = ar.querySelector('.act-horaire').value.trim();
                    const t = ar.querySelector('.act-titre').value.trim();
                    const d = ar.querySelector('.act-desc').value.trim();
                    if(h || t || d) acts.push({ horaire: h, titre: t, desc: d });
                });
                if (title || acts.length > 0) programmeComplex.push({ titre_jour: title, activites: acts });
            });

            const payload = {
                user_id: userId,
                destination: document.getElementById('destination').value.trim(),
                date_depart: document.getElementById('date_depart').value || null,
                date_retour: document.getElementById('date_retour').value || null,
                vol_nom: document.getElementById('vol_nom').value.trim(),
                vol_numero: document.getElementById('vol_numero').value.trim(),
                vol_retour_nom: document.getElementById('vol_retour_nom').value.trim(),
                vol_retour_numero: document.getElementById('vol_retour_numero').value.trim(),
                pdf_url: document.getElementById('pdf_url').value.trim(),
                hotels: hotelsArray,
                programme: programmeComplex
            };

            const { error } = await supabaseClient.from('voyages').upsert(payload, { onConflict: 'user_id' });
            
            btnSubmit.disabled = false;
            btnSubmit.innerText = "💾 Enregistrer et synchroniser le voyage";

            if (error) {
                alert("Erreur lors de la sauvegarde : " + error.message);
            } else {
                alert("✨ Synchronisation réussie ! Les données de votre client ont été mises à jour en direct sur son application.");
            }
        });
    </script>
</body>
</html>
